services:
  # 后端服务 — Java Spring Boot
  backend:
    build: ./backend
    container_name: poke-three-backend
    restart: unless-stopped
    volumes:
      - poke-data:/app/data
    expose:
      - "3000"

  # 前端服务 — Nginx 托管静态文件 + 反向代理
  frontend:
    build: ./frontend
    container_name: poke-three-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  poke-data:
    driver: local
